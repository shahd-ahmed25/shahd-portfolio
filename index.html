<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    body{
      background-color: #0A192f;
      padding: 0 25px;
      font-family: 'Inter', sans-serif;
    }
    h1{
      color: #CCD6F6;
      font-size: clamp(80px, 20vw,110px);
      margin: 0px;
      font-weight: 700;
      padding-top: 120px ;
      padding-left: 45px;
    }
    .hero{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h3{
      color: #CCD6F6;
      font-size: clamp(40px, 9vw,52px);
      margin: 0px;
      font-weight: 600;
      margin-top: 30px ;
      margin-left: 50px;
    } 
  p {
    color: #8892B0;
    font-size: clamp(32px, 7vw, 48px);
    margin: 0px;
    font-weight: 400;
    margin-top: 50px;
    margin-left: 50px;
    max-width: 90%;
    line-height: 1.4;
  }
    
  </style>
</head>
<body>
  <div class="hero">
    <h1>Shahd Ahmed</h1>
    <h3>Frontend Engineer </h3>
    <p>I transform ideas into fast, interactive frontend experiences.</p>
  </div>
</body>
</html>
